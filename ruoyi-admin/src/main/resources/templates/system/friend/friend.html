<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('好友信息列表')" />
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
<!--            <div class="col-sm-12 search-collapse">-->
<!--                <form id="formId">-->
<!--&lt;!&ndash;                    <div class="select-list">&ndash;&gt;-->

<!--&lt;!&ndash;                    </div>&ndash;&gt;-->
<!--                </form>-->
<!--            </div>-->

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="system:friend:add">
                    <i class="fa fa-plus"></i> 添加
                </a>
<!--                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="system:friend:edit">-->
<!--                    <i class="fa fa-edit"></i> 修改-->
<!--                </a>-->
<!--                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="system:friend:remove">-->
<!--                    <i class="fa fa-remove"></i> 删除-->
<!--                </a>-->
<!--                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="system:friend:export">-->
<!--                    <i class="fa fa-download"></i> 导出-->
<!--                </a>-->
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('system:friend:edit')}]];
        var removeFlag = [[${@permission.hasPermi('system:friend:remove')}]];
        var statusDatas = [[${@dict.getType('sys_add_type')}]];
        var prefix = ctx + "system/friend";
        var userId = [[${userId}]];


        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "好友信息",
                columns: [
                    {
                        field: 'addName',
                        title: '添加人name'
                    },
                    {
                        field: 'friendName',
                        title: '好友name'
                    },
                    {
                        field: 'friendStatusName',
                        title: '好友在线状态'
                        ,formatter: function(value, row, index) {
                            if(value == 1 ){
                                return "在线";
                            }else {
                                return "离线";
                            }
                        }

                    },
                {
                    field: 'status',
                    title: '添加状态 ',
                    formatter: function(value, row, index) {
                       return $.table.selectDictLabel(statusDatas, value);
                    }
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        if (row.frienduserId == userId){

                            actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.id + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        }
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);

            // 进入页面创建websock
            var socket = new WebSocket("ws://192.168.0.107:8085/webSocketEndpoint");
            socket.onopen = function(event) {
                // socket.send(JSON.stringify({"type": 1}))
                setInterval(function() {
                    socket.send(JSON.stringify({"type": 1}));
                }, 5 * 1000)
            };
            socket.onmessage = function(event) {
                var jsonObject = JSON.parse(event.data);

                var tableData = $('#bootstrap-table').bootstrapTable('getData');
                for ( var i = 0; i < tableData.length; i++ ) {
                    console.log(tableData[i].frienduserId);
                    console.log(jsonObject[tableData[i].frienduserId]);
                    if (jsonObject[tableData[i].frienduserId] != null){
                        tableData[i].friendStatusName = 1
                    }else {
                        tableData[i].friendStatusName = 0
                    }
                }
                console.log(tableData)
                console.log(jsonObject)
                $('#bootstrap-table').bootstrapTable('load', tableData);
            };
            // 关闭连接
            socket.onclose = function(event) {};
            // 断开重连
            socket.onerror = function (evt) {};
        });

    </script>
</body>
</html>
