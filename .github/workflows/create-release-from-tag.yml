name: Create Release From Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Read tag message
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"

          if git cat-file -e "$TAG^{tag}" 2>/dev/null; then
            git for-each-ref "refs/tags/$TAG" --format='%(contents)' > RELEASE_NOTES.md
          else
            echo "Release $TAG" > RELEASE_NOTES.md
          fi

          echo "Release notes:"
          cat RELEASE_NOTES.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "$TAG" \
              --notes-file RELEASE_NOTES.md
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file RELEASE_NOTES.md \
              --latest
          fi
