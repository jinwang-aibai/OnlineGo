name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Sync Gitee Release to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_REPO: jinwang0328/online-go-game
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF#refs/tags/}"

          echo "Current tag: ${TAG}"
          echo "GitHub ref: ${GITHUB_REF}"
          echo "GitHub sha: ${GITHUB_SHA}"

          git fetch --force --tags origin

          echo "---- tag info ----"
          git for-each-ref "refs/tags/${TAG}" \
            --format='tag=%(refname:short) object=%(objectname) type=%(objecttype)'

          ENCODED_TAG="$(jq -rn --arg tag "${TAG}" '$tag | @uri')"
          GITEE_RELEASE_URL="https://gitee.com/api/v5/repos/${GITEE_REPO}/releases/tags/${ENCODED_TAG}"

          echo "Fetching Gitee release ${GITEE_REPO}@${TAG}"
          if [ -n "${GITEE_TOKEN:-}" ]; then
            curl -fsSL -G "${GITEE_RELEASE_URL}" \
              --data-urlencode "access_token=${GITEE_TOKEN}" \
              -o gitee_release.json
          else
            curl -fsSL "${GITEE_RELEASE_URL}" -o gitee_release.json
          fi

          if ! jq -e '.tag_name // empty' gitee_release.json >/dev/null; then
            echo "::error::Gitee release for tag ${TAG} was not found or returned an unexpected response."
            cat gitee_release.json
            exit 1
          fi

          RELEASE_TITLE="$(jq -r --arg tag "${TAG}" '.name // .tag_name // $tag' gitee_release.json)"
          if [ -z "${RELEASE_TITLE}" ] || [ "${RELEASE_TITLE}" = "null" ]; then
            RELEASE_TITLE="${TAG}"
          fi

          jq -r '.body // ""' gitee_release.json > release_body.md
          if [ ! -s release_body.md ]; then
            echo "Release ${TAG}" > release_body.md
          fi

          echo "---- release title ----"
          printf '%s\n' "${RELEASE_TITLE}"
          echo "---- release body ----"
          cat release_body.md

          # 创建或更新 GitHub Release，让 GitHub Release 内容与 Gitee Release 保持一致
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" \
              --title "${RELEASE_TITLE}" \
              --notes-file release_body.md
          else
            gh release create "${TAG}" \
              --title "${RELEASE_TITLE}" \
              --notes-file release_body.md
          fi
